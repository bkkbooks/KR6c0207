body:
  text: 大慈恩寺沙門圓測撰受持品第七將釋此品略有二義一釋品名二正釋文釋品名者依智度論由信力故聞而奉行為受由念力故久久不失為持此品正明十三法師受持般若又令他受名受持品經爾時月光至般若波羅蜜釋曰第二依文正釋前五品中辨正宗訖故下二品依教奉持於中有二初明受持後明付屬此即初也於一品內文別有三初問答正説十三法師次佛告波斯下付王受持後時諸大衆下明時衆得益前中有二初月光王請後大牟尼如來正説請中有二初觀瑞疑念後發言陳請此即初也文有三節一觀釋迦五種神變二見臺上寶滿佛是一切佛化身主者若準梵網經是盧舍那佛或云盧招那亦云盧折羅此云照也以報佛淨色遍周法界故又日月燈光遍周一處亦盧舍那一也或可義翻名寶滿此佛化千葉釋迦佛及百億葉上化佛故言化身主也三復現千華葉世界上佛者即是千華葉上千佛及一一葉上百億佛其中如上諸佛各各説般若波羅蜜此當梵網經云我今盧舍那方坐蓮華臺周匝千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道問此上寶滿佛於三身中何身所攝有説自受用身此説不爾自受用土無法衆故有説他受用身此亦不然諸微塵衆聽佛説故今解於化身中本末差別非受用身更勘無上依經大乘同性經毗盧舍那釋迦有何差別也經白佛言至不可以識識釋曰自下第二發言陳請初讚後請此即讚也若依本記過言説故不可説過想心故不可解過覺觀故不可以識識此當智度論説言語道斷心行處滅依解深密經云心言路絶經云何至開空法道釋曰第二請也開謂開發道即聖道於人法境開發空慧名空法道此中問意諸佛所説甚深般若難説難識云何諸善男子於此經中明了覺解依何觀門為諸衆生開法空道經大牟尼言至為大法王釋曰第二如來正説於中有三初總標次善男子其法師下別釋後善男子如是諸菩薩下總結前中有三初總標次別敘後勸供此即初也經從習忍至依持建立釋曰第二別敘依謂所依持謂攝持為衆所依能攝持衆建立正法經汝等大衆至而以供養釋曰第二勸供應知經善男子其法師者釋曰第二別釋十三法師文別有二初諜總名後次第別釋此即初也經習種性菩薩釋曰自下第二次第別釋十三法師分為十三此即第一釋習種性文別有五一標位列名二辨類差別三行業不同四舉劣顯勝五入位時分此即第一標位列名謂十三法師中第一法師名習種性菩薩經若在家至比丘尼釋曰第二辨類差別略辨四衆一婆差二優婆差三比丘四比丘尼言婆差者或云優婆塞皆訛略也正言塢波索迦此云近事男塢波斯迦此云近事女索是男聲斯是女聲謂彼恆時親承善士故名近事廣釋如前比丘及比丘尼亦如前釋經修行十善釋曰第三行業不同文別有三初修十善次修不淨忍後住在佛家此修十善謂不殺生等十善業道或可十信十種信心雖有兩説本記意存十信經自觀己身至分分不淨釋曰第二修不淨忍自有三種一觀六大不淨二觀諸根不淨三觀三界不淨此觀六大謂諸有情六界成身所謂四大及空界也色界有漏識皆是有漏可破壞故名為不淨六界別觀故言分分經復觀十四根至菩提心釋曰第二諸根不淨謂於二十二根中復觀十四根以為不淨所謂眼等五根有五識情或可有情數攝名五情根五受根者苦樂憂喜捨及男女意命皆是有漏有無量過故説十四皆為不淨信等五根及三無漏皆唯善性過中不説故觀行者觀十四根即發無上菩提心也經常修三界至忍觀門釋曰第三觀三界不淨謂三界繫法皆有漏故亦是不淨問曰四靜慮及無色界亦有淨法如何説為不淨邪解云不淨自有多種如瑜伽第二十六卷説有六種不淨一朽穢不淨自有二種一依內不淨謂髮毛等二依外不淨謂青瘀等二者苦惱不淨謂苦觸所生受三下劣不淨所謂欲界四觀待不淨如待無色勝清淨事色界諸法便似不淨待菩迦耶寂滅涅槃乃至有頂皆似不淨五煩惱不淨謂三界中所有一切結縛睡眠隨煩惱纏六違壞不淨謂五取蘊無常無恆不可保信變壞法性具説如彼由此靜慮無色皆名不淨經住在佛家釋曰第三住在佛家文別有二初明住在佛家後修六和敬此即初也謂空無我佛所住處名為佛家此習種性初證空理故名為住經修六和敬至波羅蜜道釋曰第二修六和敬謂住佛家故修六和敬所謂三業同戒同見同學八萬四千波羅蜜為六和敬經善男子至有退有進釋曰第四舉劣顯勝文別有二初舉劣後是定人下顯勝前中有二初上釋劣位後雖以下釋通伏難前中有三初法次喻後合此即法説謂習忍以前十信菩薩有退有進故名劣位經譬如輕毛隨風東西釋曰第二舉喻可知經是諸菩薩亦復如是釋曰第三合喻可知經雖以十千劫至名不定人釋曰第二釋通伏難文有兩節初牒三伏難後而不可下標宗略答十善菩薩有其三義一以十千劫行十正道發菩提心當入習忍位三亦常學三伏忍以具三義謂應不退如何説言有退有進故作此言雖有三事而不可字名是習種性是名不定人經此定人者至聖人性故釋曰第二顯其勝位文別有二初明證理後明離過此即初也謂十住位初證生空理由此證得聖人性故名為定人亦是不退問此種性菩薩為如此經定不退耶或有即耶解云設爾何失若廣分別如前已説經必不起至無有是處釋曰第二離過有其四重一不起五逆所謂殺父母羅漢出佛身血破和合僧二不起六重如優婆塞經第四卷受戒品説一殺生二偷盜三淫蕩四妄語五沽酒六謗説在家出家四衆過失廣説如彼餘經或説四重八重四重者一貪嫉二慳三嗔四謗三寶藏言八重者即菩薩八重前四重上加僧四重即名八重言十重者前六重上加貪等四名為十重今此説六犯即失戒法名為重法過中極重名為重也三者不起二十八輕亦如優婆塞經受戒品説一不供養父母師長二耽樂飲酒三污惡不能瞻視病苦四見有乞者不能多少隨宜而與空遣還者五若見比丘比丘尼長老先宿諸優婆塞優婆夷等不起奉迎禮拜問訊六若見比丘比丘尼優婆塞優婆夷毀所受戒心生憍慢言我勝彼彼不如我七月月之中不能六日受持八戒供養三寶八四十里中有講法處不能往聽九受招提僧衆具床座十疑水有蟲故便飲之十一險難之處無伴獨行十二獨宿尼寺十三為於財命打罵奴婢童僕外人十四若以殘食施於比丘比丘尼優婆塞優婆夷十五若畜貓狸十六畜養象馬牛羊駝驢一切畜獸不作淨施未受戒者十七若不貯畜僧伽梨衣鉢盂錫杖十八若為身命須田作者不求淨水及陸種處十九為於身命若作市易斗稱賣物一説價已不得前卻捨賤趣貴斗稱量物仕前互用如其不平應語令平二十若於非處非時行欲二十一齎估反賣不輸官稅盜弄去者二十二若犯國制二十三若得新穀果苽菜茹不先奉獻師供養三寶先自受用者二十四僧若不聽説法讚歎輒自作者二十五道路若在諸比丘前沙彌前行二十六僧中付食若偏為師選擇美好過分與者二十七若養蠶者二十八行路之時遇見病者不住瞻視為作方便付屬所在而捨去者四不起諦法謂定位者不謗佛法經書言非佛説經能以一阿僧祇至僧伽陀位釋曰第四入位時分梵音阿僧祇劫此云無數劫謂日月歲數不可數故名阿僧祇或三災等劫不可數故乃至大小乘宗三大阿祇名阿僧祇今於此中依日月歲數非三災等僧伽陀位者相傳釋云性種性或云離著謂證人空而不執著我有情等此意説云一僧祇修行習忍始入性種性經復次性種性釋曰第二性種性文別有三初標位列名次辨觀差別後入位時分此即初也初學名習數習成性故十行乃名性種性也經行十慧觀釋曰第二辨觀差別於中有五一行觀行二滅障三知俗四練觀五修行此即初也言行十慧觀者謂四念處三善根及三世觀如前教化品中説經滅十顛倒釋曰第二滅障言滅十顛倒者謂四念處觀除四顛倒三善根觀除其三毒或三世觀除三世執定有過去因有未來果及現在因果執皆不順理並名顛倒經及我人知見至不可得釋曰第三知俗謂我人知見者依世俗説分分假偽而非實有但有名即是名假但有受即受假但有法即法假由此道理實不可得故知我人等者皆世俗有經無定相至修道空觀釋曰第四練觀無定相者總標我法無其定相無自他相故者別釋我法無自他相此即兩釋一云無自相者顯無我相無他相者顯無法相一云無自相者無人我法我相無他相者無人我法我二種我所相修護觀門者如上觀門未得名修已得名護已上文意義趣難了有諸異説恐繁不述經亦常行百萬至念念不去心釋曰第五修行謂此位中觀漸勝故行諸波羅蜜常不離心經以二阿僧祇至波羅陀位釋曰第三入位時分波羅陀者若依本記翻名守護謂道種性位其行堅牢不失自性名守護位此明十行以二僧祇行正道法得住十回向也若依本記配屬十行名道種性便違經説伏忍聖胎三十人經復次道種性釋曰第三道種性文別有三初標位列名次辨觀差別後入位時分此即初也地上聖道之種性故名道種性故上經云修行上伏忍進入平等道名為道種性經住堅忍中至無生無滅釋曰第二辨觀差別於中有二初辨觀差別後受報勝劣前中有三初總標觀相次別敘十觀後舉勝簡劣此即初也住十堅心名住忍謂此位中觀一切法皆是無生生既不成便無住滅是觀空義經所謂五受至不可得故釋曰第二別敘十觀所謂五受三界二諦言五受者有漏五蘊貪等所取名五受蘊由觀彼故得五分法身觀三界得三空忍觀二諦得無常無生二忍廣如前説如是十法無自他相及如實性不可得故皆説為空經而常入至心心寂滅釋曰第三舉勝簡劣謂此位中雖行十忍而滿分中簡前九忍而行第十真諦忍觀即説無生忍觀名為第一義諦觀也心心寂滅者寂謂寂靜滅謂除滅即彼心行念念寂靜滅除散動故名心心寂滅經而受生三界釋曰第二受報勝劣文別有三初標次徵後釋此即總標雖心寂靜而受生三界果報經何以故釋曰第二徵也謂外詰云已得寂滅如何能受分段報耶經業習業報至順道生釋曰第三正釋謂由舊業熏習力故而受三界分段生死能為聖道之所依止故名順道生或可為化有情受六道身隨順聖道故言順道生雖有兩釋前説為勝如上所説種性菩薩不生惡道故經復以三阿僧祇劫至正位釋曰第三入位時分言平等聖人地名謂入初地聖道離能所取相或可初地雙證二諦故言平等阿毗跋致此云不退謂初地已上證理不退名不退謂三阿僧祇修諸度故當入聖位當住不退經復次善覺菩薩摩訶薩釋曰第四善覺文別有五一標位列名二辨修差別三以四下入藏時分四無三界下明受生差別五常修下登位分齊此即第一標位列名準上可知經住平等忍至不去心釋曰第二辨修差別文別有二初顯二智別相後如是善男子下重顯二智同異前中有二初立二章後入無相捨下別釋二章此即初也言平等忍者第一章明其實智離有無相名平等忍言修行四攝念念不去心者立第二方便智謂以四攝化衆生名方便智經入無相捨至貪煩惱釋曰自下第二別釋二章於中有二初釋實智釋上平等後無量下顯方便智釋上四攝前中有三初總標實智滅三界貪次別釋實智證三無為後顯無為離有無相此即初也離三輪捨無貪性故能滅三界貪欲煩惱經於第一義至為法性無為釋曰第二別釋實智證二無為文別有三初法性無為次擇滅無為後非擇滅無為此即初也此有兩名一者法性二者虛空經緣理而滅至無相無為釋曰第二擇滅無為謂緣真如滅一切煩惱等相所顯真如為擇滅無為此有三名一者擇滅體即是智擇謂簡擇擇所得滅故名擇滅二數緣滅數謂慧數慧數所得名數緣滅三智緣滅擇之與智其義一也經住初忍時至無相無為釋曰第三非擇滅無為謂住信忍中第一下忍永斷一切分別煩惱故能於無量未來法中得非擇滅無相無為此有三名一非擇滅二非數緣滅三非智緣滅準上應知然此二滅有差別者薩婆多宗由智斷障名為擇滅滅不由智名非擇滅依經部宗有漏智斷名非擇滅無漏智斷名為擇滅今依大乘大同經部具如別章問豈不虛空及非擇滅非無漏智境如何無相智得證三無為解云諸宗不同薩婆多宗不許無漏智緣二無為依大乘宗於真如上假安立故許緣無失經無相無為至無無相故釋曰第三顯三無為離有無相意顯三種其性皆空然釋此文諸説不同一云釋無相有其三句初無自他者遣其有相無無者遣其無相言無相故者雙遣亦有無相或有説者具遣四句無自他相遣有相無無者遣無相言無相者遣第三句亦有亦無相及第四句非有非無相今解無自他者遣我相即顯生空理無無無相者顯法空理非無相故言無無非有相故言無相經無量方便皆現前觀釋曰第二顯方便智文別有二初總標六種後別釋六種此即初也亦非一故名無量非內證智故名方便經實相方便至不顛倒釋曰自下第二別釋六種方便即分為六皆有二段先牒後釋此釋第一實相方便緣第一義故名實相起巧功能名為方便問與根本智有何差別解云如成唯識云根本智內證自體不變影像此後得智緣真如境變影而緣不能親證於第一義諦不沈等言諸説不同若依本記凡夫名沈沒生死故二乘名出出生死故三十心至十地已還名不轉佛地名不顛倒十回向中學此法也此説不然所以者何彼釋如是善男子下方屬初地已上諸文屬十回向不當經意故今不依今解不然一云初二如上十住行可轉十回向猶有顛倒初地離前四位故説四不一云沈謂惛沈即是定障出即掉舉即是慧障轉者疑等餘惑顛倒即是我見等倒入初地時離上四過故説四不經遍學方便至一切學釋曰第二遍學方便依本記云俗中有真非證真中有俗非不證有説五乘中不取人天及二乘故非證有大乘故非不證如成實論廣學諸異論遍知聖者意又善戒經遍學五明論等而不分別證不證雖非證不證而能學一切法有本云一切學者謬經回向方便而向薩婆若釋曰第三回向方便謂求大菩提不同二乘求住小果名非住果不同凡夫無求住果名非不住求趣菩提名向薩波若經魔自在至四魔所不動釋曰第四魔自在方便者接引方便也非道行佛道者即維摩云或現作淫女引諸好色者先以欲鉤牽後令入佛道也魔不動者即維摩中在欲而行禪令魔心憒亂不能得其便也言四魔者一煩惱二陰魔三者死魔四者天魔前四魔上更加無常無我不淨苦別名八魔也又釋謂雖行魔事巧便自在故名魔自在方便故維摩云住不可思議解脫菩薩以方便力教化衆生現作魔又佛道品云若菩薩行於非道是為通達佛道云何菩薩行於非道答曰菩薩行五無間而無惱患乃至云示有妻妾婇女而常遠離五欲淤泥是為菩薩通達佛道具説如彼經一乘方便至一切行故釋曰第五一乘方便謂理體無二故説一乘於一乘法巧知衆生差別相名為方便不二相者釋上一乘於中通達一切行相者釋其方便又金光明經云法界無分別為度衆生分別説三乘又法華云諸佛以方便力於一佛乘分別説三具説一乘義如別章經變化方便至淨佛國土釋曰第六變化方便言變化者變易異名故顯揚及唯識依此説變易生死名變化生此明地上菩薩由願力故於淨土中受變易生不受三界分段之身故名變化方便經如是善男子至實智照釋曰第二重顯二智同異於中有三初結上異相次舉喻顯非一異後以一切行成就者顯行成就此即初也文別有二初顯實智相後顯方便智此即初也謂於初地根本智生創覺生法二空故言初覺智即此覺智於有無相而不二故是實智照故前文言無自他相無無相故也經巧用不證至方便觀釋曰第二顯方便智言巧用者總標四用謂即彼地後得智四用巧妙名為巧用不證等者別顯四用不證者不同外道證四靜慮以為涅槃不沈者不同凡夫沈沒生死不出者不同二乘出離生死不到者不同地前菩薩不到初地或可不到者謬也應言不倒謂地前菩薩猶起顛倒為簡彼故故言不倒是方便觀者結上四用皆後得智經譬如水之與波不一不異釋曰自下第二舉喻顯非一異文別有二初明二智不一不異後類顯諸行亦體非一異謂上二智同一剎那二用別故不一同一慧故不異譬如水之波體相別故不一波即水故不異經乃至一切行至不一不二故釋曰第二類釋諸行亦非一異謂如二智不一不異如是乃至一切八萬四千波羅蜜行諸禪定門及陀羅尼門展轉相望皆非一異經而一一行成就釋曰第三顯行成就謂此位中二智成故餘一切行悉皆成就經以四阿僧祇至功德藏門釋曰第三入藏時分謂於此地無漏觀成攝藏一切諸功德門由斯別立功德藏門理應諸位應有此門以非初故故不別立此中意説四阿僧祇行諸行故入此藏門有釋此文準上下文應置一切淨土已後方説此文所以者何四劫滿當入後位故經無三界業至畢竟故不造新釋曰第四受生差別文別有二初明不生三界後明生於淨土此即初也謂入初地斷分別我見不造三界業故畢故業而不造新問地上菩薩不受分段身諸處所説十王報以何業受西方諸師自有兩釋一云地上菩薩皆受變易故受十王皆是化身不爾十處應不見王變易妙身非彼境故一云有一論師名調伏光依解深密作如此説八地已上所現王身唯是變化七地已前故起煩惱資三界業受分段身此則實身受十王報故無有失經以願力故至一切淨土釋曰第二以願力故生於淨土有解從多分説若煩惱資或生三界如調伏光説經常修捨觀至常授與人釋曰第五登位分齊文別有二初明登位後明寶施此明登位鳩摩伽若依本記翻為勝惡魔初地離五怖畏過二乘魔也經以四大寶藏常授與人釋曰第二寶施諸説不同一云三藏及雜藏施諸衆生一云依勝鬘經四種寶藏一者無價菩薩乘也二者上價緣覺乘也三者中價聲聞乘也四者下價人天乘也若依地持四攝益物名四寶藏經復次德慧菩薩釋曰第五德慧菩薩文別有三初標位列名次辨觀差別後入位時分此即初也謂具律儀等三種戒德與慧俱生故名德慧經以四無量心釋曰第二辨觀差別文別有三初顯地別行次辨除障後位分齊此即初也為欲對治嗔煩惱故修四無量義如上説經滅三有嗔等煩惱釋曰第二辨除障也由修慈故能滅三界嗔等煩惱然嗔煩惱諸宗不同若依薩婆多唯在欲界依經部宗嗔通三界依大乘宗瑜伽等説同薩婆多今依此經同經部説或可此經隨轉理門或可此文言總意別謂三有中欲界有嗔故言三有嗔等據實不通上界經住中忍中行一切功德釋曰第三位分齊也謂信忍住通在三地此當第二故名中忍謂此位中無量為首通修諸行經以五阿僧祇至化一切衆生釋曰第三入位時分闍陀波羅若依本記翻為滿足力謂五大劫行大慈觀常現前故智力滿足化諸衆生故亦入闍陀波羅位亦云離闍亦名無畏經復次明慧道人釋曰第六明慧菩薩文別有三初標位列名次辨觀差別後入位時分此即初也謂此位中行三明觀故名明慧經常以無相至三明觀釋曰第二辨觀差別文別有三初顯地別行次辨位除障後明滿足前中有二初標三明觀後釋其行相此即初也三明觀者一宿命智明二生死智明三漏盡智明廣如序品經知三世法至心心寂滅釋曰第二釋其行相知三世法者標三明知三世法無來無去無住處者別顯三明所行之境謂未來未有過去已滅現在不住不同薩婆多宗三世皆有實體心心寂滅者所緣無故能緣之心念念寂滅經盡三界癡煩惱釋曰第二辨位除障知三世故能除三界迷三世愚經得三明一切功德觀故釋曰第三明德滿足謂除三世愚故能得隨順三明諸功德觀經常以六阿僧至一切法釋曰第三入位時分伽羅陀者此云度邊謂此位中離於邊鄙下賤諸見故云伽羅陀雖有此釋未勘誠文謂六大僧祇集無量明故入伽羅陀位以無相行受持諸法經復次至聖覺菩薩釋曰自下第七法師文別有三初標位列名次顯地別行後行位時分此即初也言爾炎者此云智母謂此位中生法二空能生聖道故名智母言聖覺達者即所生聖智前之三地行施戒修相同凡夫於此位中起道品觀初證聖覺達二空理名聖覺達經修行順法忍釋曰第二顯地別行文別有三初修忍法位次起五神通後滅障分齊就初位中文復有二初屬順忍後辨住位此即初也謂順忍中有其三位謂下中上此第四地於三忍中位在初忍順聖道故名為修行順法忍也經逆五見流至住須陀洹釋曰第二辨其住位言須陀洹者有其二義一逆流二修習於此地中起道品觀逆五見流集無量德故名住須陀洹位依瑜伽等翻為預流預者入也流即流類初入聖流故名預流問是不五見分別起者入初地時皆已永斷如何此云依第四地逆五見流解云據實分別五見初地位斷今斷習氣名斷五見若不爾者疑但分別煩惱所攝唯見所斷如何此云五地所斷故知此約習氣而説經常以天眼至身通達釋曰此即第二起五神通於此位中未至究竟故六通中除漏盡通而智度論及下文中説菩薩漏盡者依未盡位假説漏盡故不相違經念念中滅三界一切見釋曰此即第三滅障分齊謂此位中配須陀洹故説能滅三界諸見經亦以至不離心釋曰第三行位時分以七大劫行五神通及波羅蜜故於滿分中如上功德常不離心也經復次勝達菩薩釋曰次辨第八法師文別有三初標位列名次顯地別行後修行時分此即初也謂能了達二三諦故名勝達亦名勝慧或可此地真俗雙行如是難事此地能勝故名勝達經於順道忍以四無畏釋曰第二顯地別行文別有三一行四無畏二辨除障三入位分齊就地數中文別有二初總標四數後次第別釋此即初也謂第五地依順道忍起四無畏於外四難心無怯懼故名無畏經觀那由他諦至一切智人釋曰第二次第別釋釋四無畏即分為四此即第一一切智無畏謂於二境無所不知一觀那由他諦謂二三諦及八諦等其數甚多名那由他二觀內道論即五明中內明論也外道論者因明論及聲明藥方即是醫方工巧究術並是工巧明論此四明論雖通內外今依一相且説外言我是一切智人者自唱德號於四無畏皆有二義一執迹生疑謂外疑難佛問阿難從何所來或問外聲是何聲等若一切智何謂發問二自唱德號我是一切智隨順世間故作此慰問經滅三界至我相已盡釋曰第二漏盡無畏亦有二事一執迹生疑謂外難言世尊或時愛語羅睺呵罵提婆如何漏盡二自唱德號我漏已盡順世間故示現愛嗔或有本云我相已盡謬也經知地地有所出故名出道釋曰第三釋出苦道無畏亦有二事一執迹生疑謂外難言以諸聖道不能盡苦見阿羅漢蛇蜇等苦似不盡故二自唱德號謂諸羅漢斷未來苦故言斷苦非謂現苦無故説斷經有何不出故名障道釋曰第四惑能障道無畏亦有二事一執迹生疑謂須陀洹等雖有愛等而有聖道故欲不能障道三自唱德號雖不能障預流果等而能障礙那含等道上來且釋佛四無畏今此文中説第五地菩薩無畏無畏之相尋即可知經逆三界疑釋曰第二除障此約習氣故説除疑據實已斷唯分別故經修集無量至入斯陀含位釋曰第三入位分齊謂此地中已滅三界疑等惑故修集無量勝分功德由此便入斯陀含位斯陀含者此云一往來謂斷欲界六品惑盡有三品故於人天中一往來名一往來經復集行至不去心釋曰第三修行時分謂於此地八劫修行諸陀羅尼及四無畏常不去心經復次常現真實釋曰次釋第九法師文別有三初標位列名次辨觀差別後明修行時分此即初也經住順忍中釋曰自下第二辨觀差別文別有五一配忍分齊二作地別觀三辨取除障四辨觀行相五立果差別此即初也謂順忍中上品取攝故言住順忍中經作中道觀釋曰第二作地別觀謂入無相觀離於有無及常斷等或依十二緣生觀離斷常故名中道觀也經盡三界集因集果一切煩惱故釋曰第三辨所除障言集因者總標三煩惱及業名為集諦言集業者別釋罪等諸業一切煩惱者別釋根本隨惑等諸煩惱或可集因者發業煩惱一切煩惱者潤業煩惱經觀非有非無至而無二釋曰第四辨觀行相言一切者真如一味相即是一相名為無相是以無量義經云一相即無相也而無二者結上一相及無相皆無有無等二相也經證阿那含位釋曰第五立果也謂此地中雖斷三界一切煩惱而微細者猶現在前是取解深密等云第七地來諸菩薩衆猶起三界貪等煩惱是故此中立阿那含阿那含者翻為不還據實六地菩薩亦生欲界如智度論今一相配故言不還經復作九阿僧祇劫至一切佛土釋曰第三修行時分樂謂願樂謂於此地九阿僧祇集中道觀隨願樂力生諸佛土經復次玄達菩薩釋曰辨第十法師文別有三初標位列名次入位時分三常行三空下辨觀差別此即標名玄謂玄遠達即通達遠至功用後邊名之為玄創入無生忍名為達也經十阿僧祇劫中修無生法樂忍釋曰自下第二入位時分文有五別一入位分齊二辨所滅分辨三住身分齊四具諸德五立果此即第一入位分齊語五忍中第四無生忍有其三品此即下品此地菩薩十僧祇修下無生忍經滅三界習因業果釋曰第二所滅分齊於此位中滅三界中業果細習經住後身中釋曰第三住身分齊住分段生死中最後一身至第八地即成變易報也經無量功德至皆滿足釋曰第四顯具諸德謂六神通盡無生智乃至五分法身悉皆具足如是諸德皆如上説經住第十地至梵天位釋曰第五立果也謂十三法師中住第十法師位於四果中第四果也梵天位者梵者淨也已住清淨行位故經常修三空至弘化法藏釋曰第三辨觀差別謂此地中空等三昧已得圓滿具足百萬三昧又以如來修多羅藏等三藏聖教弘化衆生經復次等覺者釋曰次辨第十一法師文別有三初標位列名次辨觀差別後千阿僧祇下修行時分此即初也者謂假者謂第八地於一切或時真俗雙觀名等覺者經住無生忍中釋曰自下第二辨觀差別文別有三初明有無觀次辨十力觀後顯登位差別前中有二初配屬忍位後正明有無觀此即初也謂於三品無生忍中住中品忍也經觀心心寂滅至無知知釋曰第二辨有無觀文別有三初別釋有無次合釋有無後雙結有無前中有二初寂而常用後用而常寂此即初也此地中觀心心寂滅者念念皆空故心心寂滅此顯常寂靜義言無相相無身身無知知者顯常用義謂常寂故離一切相而依俗故示現無相似常空寂故色身而依俗故常用色身以常寂故無知而依故恆能照經而用心至無住之住釋曰第二用而常寂初之二句顯其有用惔怕已下顯常寂義有本任於無任之任者謬經在有至常萬化釋曰第二合釋有無言在有常修空者釋上用而常寂處空常萬化者釋上寂而常用經雙照一切法故釋曰第三雙結謂俗不離真寂而常用真不離俗用而常寂經知是處非處乃至一切智十力觀故釋曰第二明十力觀謂此位中學十力觀舉初後二顯中間八合有十力觀十力差別義如別章經而能發摩訶羅伽位化一切國土有本無登字釋曰第三登位差別摩訶羅伽若依本記翻為大聖即佛法之大將或云無功用位或翻大力或翻龍象經千阿僧祇劫至見佛三昧釋曰第三修行時分此結住自位經爾所劫從此以後功難成故時分漸多經復次慧光神變者釋曰次辨第十二法師文別有三初標位列名次辨觀差別後萬阿僧祇下明入位時分此即初也謂第九地四無礙智化諸有情或起六神通名為慧光及神變者經住上上無生忍釋曰自下第二辨觀差別文有四節一配忍三品二明滅心心相三四眼見法觀四生淨土此即第一配忍三位謂無生忍有其三品此即上品而言上上者前上是勝義後上順品數謂此第九地得四辨等故言勝也經滅心心相釋曰第二明滅心相於此位中除滅心心有執相故名言勝也滅心心相有説滅見分相分二相故言滅心心相今解滅心自性名為滅心若滅心上差別名滅心相經法眼見一切法三眼色空見釋曰第三四眼觀門謂法眼見一切法病藥等種種別相三眼見色空者謂肉眼見麁色天眼見麁細慧眼見色空據實慧眼觀諸法空今對肉天二眼故但説見色空也若依本記法眼見一切真如也餘如前説經以大願力常生一切淨土釋曰第四常生淨土經萬阿僧祇至佛華三昧釋曰第三入位時分薄伽梵位此云世尊具諸德故亦説九地名世尊佛華三昧亦復如是似佛定故名為佛華經復次觀佛菩薩釋曰次辨第十三法師文別有四一標位列名二登位時分三善男子下諸位相對辨差別相四常修下明入位住定此即第一標位列名謂此位中二種觀佛一眼見者唯他受用二定心見通觀三身經住寂滅忍者至住金剛臺釋曰第二登位時分文有四節一配五忍二徑時分齊三辨所修德四顯登住位言住寂滅忍者配五忍位謂寂滅忍自有二種一者下品二者上品今第十地即是第五寂滅忍中位下品忍也言從始至徑百萬阿僧祇劫者總計從習種性至灌頂忍徑百萬阿僧祇劫也言修百萬阿僧祇劫功德者辨所修德量言登一切法解脫者就當得位即是妙覺住金剛臺者金剛三昧正明等覺如來或可解脫自有兩種一者等覺二者妙覺今此金剛雖非妙覺解脫果攝而成等覺解脫故名登一切法解脫經善男子至一切煩惱釋曰自下第三諸位相對辨差別相文別有五一伏斷差別二信見差別三頓漸差別四常無常異五等無等異此即第一伏斷差別文別有二先伏後斷此即伏也謂從習忍至頂三昧皆名為伏一切煩惱者伏義寬故通名為伏依本記云皆名伏者從十信至金剛末斷阿賴耶識一剎那在故説為伏一切煩惱廣説如彼經而無相信至照第一義諦釋曰此顯第二斷義狹故初地已上無漏信位方能欲斷言無相者即是無漏也無有漏相故名無相謂無相信為無間道斷滅一切煩惱生解脫道照見第一義諦經不名為見所謂見者是薩婆若釋曰第二信見差別文別有二初正釋信見後引説證成此即初也除佛已前但説為信不名為見所謂見者是一切智經是故至不見不覺有本云唯佛所知者謬釋曰第二引説證成知見覺三異名同體雖通因果皆得此名今從勝説故唯在果經唯佛頓解不名為信漸漸伏者釋曰第三漸頓差別唯佛頓解不名為信漸漸伏者所以者何頓斷一切二障盡故但名為見不名信者亦不名為漸漸伏者經慧雖起滅至無生無滅釋曰第四常無常異或可無礙與解脫異即依此文自有兩釋一真諦三藏立如是義佛果功德菩提涅槃皆無生滅故通伏難以三宗義謂外難云無間道時慧有生滅如何能生無生滅智故作此言金剛時慧雖有生滅能證知無生滅理由斯勝慧證理深故此心若滅便能證得纍盡涅槃亦能證得無生無滅常住菩提故前經言薩云若覺非有非無湛然清淨常住不變同真際等法性二慈恩三藏作如是説金剛時慧雖有生滅而能證解無生滅理故能證得果盡涅槃亦能證得常住法大菩提也前經所説常住不變者就勝説故且説實相而非觀照經入理盡金剛三昧至等無等等釋曰第五等無等異或可無間與解脫異文別有三初法次喻後合此即法説謂入理盡金剛三昧清淨無染同道後真如際等於道前法性真如也言而未能等無等等者謂佛世尊下不及故名為無等與諸佛齊故名為等金剛已還無能等無等等也經譬如有人至無不斯了釋曰第二舉喻可知經住理盡三昧亦復如是釋曰第三合喻應知經常修一切至佛慧三昧釋曰第四入位住定謂此位中一切六度及四攝等行已滿足具功德藏入婆伽度住佛慧三昧梵音婆伽度此云世尊即十號中之一位也住此位中觀三身三昧方得圓滿經善男子如是至等無有異釋曰就依請正説十三法師文別有三初標次善男子下別釋後善男子下結歎上來已釋兩段訖此即第三結歎勝德與佛無異經佛告波斯至般若波羅蜜釋曰自下第二付王受持文別有四一讚用勸持二大王是般若下讚名勸持三大王我今下釋勸所由四大王今下稱名付屬初中有二前略讚勸持後大王下廣讚勸持略中有五一應時勸持二勸持所由三結屬諸王四外人徵詰五如來釋此即初也謂我正法滅時受持一部仁王般若經大作佛事至般若波羅蜜釋曰第二勸持所由有其三種一大作佛事謂滅惡生善二國土安立三萬姓快樂或可初一內護後二外護如是利益皆由般若經是故付屬至清信女釋曰第三結屬諸王經何以故釋曰第四外人徵詰經無王力至解其義理釋曰第五始來正釋經大王吾今至帝王歡喜釋曰自下第二廣讚勸持文別有二初總標除難福生後問答分別別釋七難此即初也三千大千世界分齊義如常釋言七福者如本記説返前七難以為七福七福者一萬姓愛重國王二四海賓伏三怨敵退散四國王自受己身五四方歌讚六百姓豐樂七未來入善道經云何為難釋曰第二問答分別釋七難文別有二先問後答此即問也經日月失度至為一難也釋曰第二答也就答七難即分為八此即第一日月失度難也謂時節轉異多令飢餓數量轉異多刀兵起色相轉異多疾病也經二十八宿至為二難也釋曰第二星宿變怪難經大火燒國至為三難也釋曰第三大火焚燒難經大水漂沒至為四難也釋曰四大水漂沒難經大風吹殺至為五難也釋曰第五大風吹殺難經天地國土至為六難也釋曰六亢旱不熟難經四方賊來至為七難也釋曰第七惡賊侵逼難廣釋七難具如本記經大王是般至龍寶神王釋曰第二讚名勸持文別有二初讚名殊勝後勸持王供養也此即初也然此八名諸説不同一云八中初一顯實相般若是諸凡聖心神體故第二明觀照般若生諸國王慧解心故後六辨文字般若有六勝因護國土故一云此能與凡聖為依故名神本能生王位故譬父母能護身命故譬神符能治邪魔名辟鬼珠能滿諸願故名如意珠令國安隱名護國珠明顯因果名天地鏡法中最勝威力難思名龍寶神王本記云六識名心第七名識第八名神此經能與凡聖八識為依故名為本能生世出世國王故譬父母外道魔王不能降伏故喻神符能除不活等五種怖畏名辟鬼珠能攝利衆生名如意珠能降七難名護國珠能顯所知名天地鏡道前道後清淨不異名龍寶神王廣説如彼經彼佛告至以經置上釋曰第二勸王供養文別有二初示供養法後別示行住供養此即初也法有六事一九色幡長九丈二九色華高二丈三千枝燈高五丈四九玉箱五九玉巾六七寶案言九色者依本記云白黑黃赤青此是五塵色并四大色為九四大色者地依灰色水依頗梨色水精火作光色火珠風作煙色經若王行時至罪過不生釋曰第二行住供養文別有二初行時供養法後住時供養法此即行時也經若王住時至如事帝釋釋曰第二住時供養如經可知經大王我今五眼至七難安起釋曰第三釋勸所由文別有二初明三世諸王福有興衰後明未來護持大作利益此即初也經若未來世至往護其國釋曰未來護持文別有三一標章舉數二次第別釋三結釋勸供養此即初也經一金剛吼至往護其國釋曰自下第二次第別釋文顯可知經是大力士至而供養之釋曰第三結釋勸供是五大力士者結五菩薩五千神王等者釋成利益當立像形下勸供養勸供養法如五神王因緣經中説雷電吼菩薩因緣中教人作讀經寫經法法用者應作一團屋八面安壁外薝隨力莊嚴令其精好八角之中開小門通人入出於其室內置八面床留小空地擬人行處八壁內外香泥塗飾一一壁上各量身坐當兩眼前以開兩孔使得見經正當二手復開二孔得容二手來去捉經欲讀經時安經壁外經架案上壁內壁外並燒好香香湯豆麵以浴身手及將瀨口善須看風若也東風即東壁外安置經卷在壁內向東讀經使風吹口氣隨風西去不熏經卷以口有番氣故作此屋寫經類讚法用如前更勘經大王吾今三寶至一切諸王釋曰第四稱名付屬文別有三初總明付屬次就勝列名後如是一切下結勸應持此即初也經憍薩羅國至波提國釋曰第二就勝列名或有經本列十五國闕沙陀衛國也然十六大國名號大集月藏分第十六大毗婆沙一百二十四梵音不同不可和會勘經如是一切至波羅蜜釋曰第三結勸應持經時諸大衆至願不生彼國釋曰第三時衆得益於中有五一明修羅得益二顯人王獲益三辨梵天等益四解餘衆獲益五釋菩薩獲益此即初也時諸大衆即總句阿修輪下顯利益也謂彼修羅聞説七難身怖聲悲發願不生彼惡國土即是厭惡欣善益也經時十六國王至出家修道釋曰自下第二人王獲益於中有二初總明諸王捨俗入道後明修道起觀差別此即初也以國付弟即是捨俗出家修道即是入道廣釋在家過失出家勝利如文殊問經第二卷經觀四大至勝出相釋曰自下第二別明修道起觀差別於中有二初明諸觀後是為下結成證得前中有四一明八勝處二明十遍處三顯初地相四辨九地相此即初也觀地水火風能造四大青黃赤白所造四色名八勝處所緣境勝煩惱故名勝處出離貪欲故名勝出相謂體相或是相狀或是行相是八勝處行解相也依大般若與此稍異彼云一內有色想觀外色少二內有色想觀外色多三內無色想觀外色少四內無色想觀外色多內無色想觀外諸色青黃赤白復為四種名八勝處依瓔珞經八名復異四大同此經四色同般若經有色等四不説青等以為四色或可此經同瓔珞經義亦無違經四大四色至入行相釋曰第二明十遍處地水火風青黃赤白空處識處名十遍處亦十一切入即是處所緣寬廣無有間隙故名遍處行相即是十一切入行解相也言不用者乘語故也故以不説八解脫者此三科法是下中上三根人觀此中唯有中上二根無下根故以是不論經三十忍是初地相釋曰第三明初地相地前三十心名三十忍即是初地方便相也初地即用第一義諦為體經第一義諦九地相釋曰第四明九地相初地證如境智平等名第一義與後九地作其因相名九地相故攝論云若於初地達法界時速能通達後一切言如地頌有如竹破初節餘節速能破得初地真智諸地疾當成經是故大王至般若波羅蜜釋曰此即第二結成證得文有兩節初明捨凡入聖後明捨分段入變易言是故大王者結所告人言捨凡夫身者謂捨地前凡夫身也言入六住身者謂入初地至第六地住地身也此上即捨凡入聖言捨七報身者謂捨七地分段報身也故智度論云七地未捨蟲身肉身言入八法身者謂入八地已上變易法身故前偈云未度報身一生在進入等觀法流地言一地行般若波羅者此法身萬行俱也或可通説十地萬行俱也經十八梵天王同無生境釋曰自下第三梵天等益等言等取阿須輪也於中有二初明得益後顯供養此即初也謂梵天等隨其根性證得三乘真實觀門問觀人法無生空理以為境也前説修羅得厭世益今此修羅得三乘觀與前異故與梵天同故與梵天一處合説經復散華供養釋曰自下第二別釋供養文有三別初總標供養次別列華名後正顯供養此即初也供養有二一財二法今此文中顯法供養經空華至三十七品華釋曰第二別列華名空華顯人空法性華明法空此二種華表伏忍也地前仰學二空觀故聖人華表信忍也初入聖法無漏信故順華表順忍也四五六地順無生故無生華表下中品無生忍也證解無生最是初故法樂華表上品無無忍也四辨自在説法樂故金剛華表下品寂滅忍也金剛三昧破諸結故此上七華表大乘法緣觀中道華表緣覺法證解緣生中道觀故三十七品華表聲聞法道品觀中得自在故經而散佛上至大菩薩衆釋曰第三正顯供養由前梵等得三乘觀以三乘華散佛等上經其餘一切衆證道迹果釋曰第四明餘衆益文有三段初明得益次列華名後正供養此即初也是前衆餘故名餘衆道迹是向果即是果又解道迹有學果即無學通三乘也前得三乘觀此證三乘果故有差別經散心空華至妙覺華釋曰第二別列華名心空華者四空也三學之中名為心學心樹華者緣生觀也十二緣生名為華樹六波羅蜜華者十地行也此上三華如次顯彼三乘法也妙覺華者佛果行也因中説果名妙覺華經十千菩薩念來世衆生釋曰第五明菩薩益於中有二初明十千菩薩得三昧益後顯十億菩薩現成佛益前中有二初明能證人後辨所證定此即初也謂此皆是地上菩薩得同體大悲憐念未來惡世衆生也經即登至金剛三昧釋曰第二明所證定於中有三初明緣果定次顯緣義定後顯得餘定此即初也謂佛果德妙窮真俗故云妙覺照理圓盡故曰圓明不沮壞故云金剛今此菩薩證得緣三之定從所緣為名也經世諦三昧至第一義諦三昧釋曰第二緣義定也於中有二初明三定後顯三勝此即初也知有漏定名世諦三昧知無漏定名真諦三昧知非安立真如名第一義諦三昧經此三諦至王三昧釋曰第二顯三勝也此三統攝一切三昧有大勝用故名為王智度論云三昧王三昧經亦得至一切行三昧釋曰第三得餘定也無量三昧者四無量定也七財三昧者緣七財定也一信二戒三慚四愧五施六聞七慧如瓔珞經説廣釋如集異門論第十六卷二十五有三昧者證解二十五有定也四人四惡趣四空及四禪梵王六欲天無想及那含是名二十五有廣如涅槃三十四及智度論説又解對治二十五有定名二十五有三昧故涅槃云無垢三昧能對治地獄有乃至得我三昧能對治非想非非想有廣説如彼一切行三昧者總攝諸行定也經復有現成正覺釋曰第二十億菩薩現成佛益謂此皆是第十地菩薩聞經力故登金剛座坐金剛定現成佛故囑纍品第八將釋此品略有二義一釋品名二正釋文釋品名者囑謂付囑纍即重纍如來重付囑此經纍代流行故名囑纍品經佛告至我誡敕汝等有本無等字者脫也釋曰自下第二正釋經文前品已明勸學流通故此品明付囑流通於中有二初明付囑誡勸後爾時無量下依教奉持前中有二初纍標付屬誡敕後廣釋付囑誡勸此即初也誡謂誡勸即標七誡敕謂教敕明其付囑等言等取餘大衆也經吾滅度後至信女時釋曰第二廣釋付囑誡勸於中有二初明付囑後五濁下廣明誡勸前中有二初明付囑時後正明付囑此即初也言八十年等者釋此經文諸説不同一云佛滅後一百年內五人住持一迦葉二十年二阿難二十年三未田地二十年三人持法經六十年見佛在世以行法故持法不滅第四商那和修二十年持第五優婆毱多亦二十年此上二人各二十年商那和修以不現見佛化故威儀法滅言八百年者正法五百年內二十五師住持佛法並是聖人相傳佛法不滅第六百年馬鳴菩薩第七百年龍樹菩薩二人持故佛法不滅八百年中持法人小故言法滅言八千年者像法末法衆生行邪法故像末二法滅涅槃云末世有十二萬大菩薩善持我法不滅就凡所見故言滅耳有説此云八十年者正法五百年內後八十年八百年者像法一千年中後八百年故言八百年八千年者末法一萬年中取後八千年故八千年也雖有此説未見誠文故不可依然此正像末法意趣難了故今略以五門分別第一釋名二出體性三時分長短四四滅法之相五會釋違文廣如別記言無佛至信女時者顯上唯舉八十年八百年八千年意以此時中三寶沈沒弘法人希是故唯舉八十年等無佛法時今言無少有名無亦有令無名無經此經三寶至讀誦解義者釋曰自下第二正明付囑文別有二初付法令持後付衆令化此即初也謂此惡時付王四衆皆令受持讀誦解義經為三界衆生至化一切衆生釋曰第二付衆令化謂與三界衆生開三行化也言三行者一者空行二七賢行三十善行有説付囑有二初付囑令解後為三界下付衆令化開空慧道者無漏慧也七賢行者七方便觀十善行者十善業道此即從勝向劣行也或可信行等七賢行也問何故前品唯付諸王今此品中通付四衆解云前品付囑護持故唯付王此品付囑令解教化衆生故通四部衆也經後五濁世至滅破吾法釋曰自下第二廣辨七誡文別有二初廣辨七誡後爾時十六下依教奉持此即第一廣辨七誡即分為七一誡諸滅法過二誡壞四部行三誡約因禁不依法四誡自毀五誡使役六誡自咎七誡謬信此即第一誡諸滅法過文別有三初明滅法人次明作下辨滅法過後當知下結成過此即初也文有三節初五濁世者滅法時分即五濁時此五濁義略以三門分別一別釋名二出體三立五所由第一釋名略有二種一者總名二者別名言五濁者即是總名五是標數濁是滓穢義故俱舍論第十二云劫減時將末壽等鄙下如滓穢故説名為濁又順正理三十二云云何濁義極鄙下故應辨捨故如滓穢故總言五濁者帶數釋也言別名者一者壽濁二者劫濁三煩惱濁四者見濁五有情濁瑜伽三十四云如於今時人壽短促極長壽者不過百年昔時不爾是名壽濁文殊問經云十歲而生二十三十乃至千年有長短故此謂命濁也如於今時漸次趣入三災中劫現有衆多飢饉疫病刀兵可得昔時不爾是名劫濁如於今時有情多分習非法貪不平等貪執持刀劍執持器杖鬪訟諍競多行諂誑詐偽妄語攝受邪法有無量種惡下不善法現可了知昔時不爾是名煩惱濁經云多貪嗔癡名煩惱濁如於今時有情多分為壞正法為滅正法造立衆多像似正法靈推求邪法邪義以為先故昔時不爾是名見濁經云邪見戒見取見取常見斷見有見無見我見衆生見是名見濁也如於今時有情多分不識父母沙門婆羅門不識家長可尊敬者作義利者作所作者今後世罪不見怖畏不修惠施不作福業不受齋法不受淨戒昔時不爾是名有情濁地持五濁亦同瑜伽經云善惡衆生下中上衆生勝劣衆生第一不第一衆生是名衆生濁第二出體壽濁即以命根為性劫濁衆生濁謂以五蘊為性煩惱濁除五見一切煩惱為性見濁即用五見為性第三立五所由者如順正理云豈不壽劫有情濁三互不相離見濁即用煩惱為性五應不成理實應然但為次第顯五衰損極增盛時何等名為五種衰損壽命衰損時極短故二資具衰損少光澤故三善品衰損欣惡行故四寂靜衰損展轉相違來喧諍故五自體衰損非出世間功德器故為欲次第顯此五種衰損不同故分五濁顯宗亦同又俱舍論第十二云由前二濁如其次第壽命資具極致衰損由次二濁善品衰損以耽欲樂自在行故或損在家出家善故由後一濁衰損自身身量色力念智勤勇及無病故廣如別章次比丘等者辨滅法人有其四類一四部衆言比丘比丘尼四部弟子者標別顯總二天龍八部者即八部衆此亦標別顯總三鬼神衆四王等貴衆後自恃齊高貴或有本云自是高貴者謬也滅破吾法者滅法勝緣由高貴故能成諸過也經明作制法至佛塔形釋曰第二辨滅法過文別有二初制四福後立四邪此制四福一制出家二制行道三制造像四制造塔如經可知經立統官至都非吾法釋曰第二立四邪教一立統官制衆安籍記僧不依僧法過二比丘地立白衣高坐此即失高下相此有兩釋一云於僧地中白衣高坐二云同處比丘下立白衣高坐三兵奴為比丘便違福田尊貴之相四受別請者失福田相是外道法非吾法也是故比丘應供法行經云若我弟子有受別請者是人定失一果二果三果四果不名比丘是其不得國王地行不得飲食國王水有五百大鬼常遮其前是比丘七劫不見佛佛不授手不得受檀越物五千大鬼常隨其後言佛法中大賊諸比丘應作次第請僧七佛法如是次第僧中有佛化僧四道果僧菩薩僧七賢僧凡夫僧欲使四方檀越得如是僧故莫別受請具説如彼又梵網經云一切不得受別請利養入己而此利養屬十方僧而別受請即取十方僧物入己又云次第請者即得十方賢聖僧而世人別請五百羅漢不如一僧次一凡夫僧若別請者是外道法七佛無也具説如彼居士請僧福田經大意亦同經當知爾時至不久釋曰第三結過應知經大王至是汝等作釋曰第三滅壞四部行文別有四一標過名二辨過相三顯其纍四結過重此即初也壞亂四部所行正道經自恃威力至弟子釋曰第二辨過相也謂制四部所行正理經百姓疾病至破國因緣釋曰第三顯其果也由制四部現感惡報經説五至不盡釋曰第四結過重也如理可知經大王至非法之行釋曰第三誡約囚禁不依法律文別有四一總標過失二別顯過相三非法等明非法囚禁四當知等者結過重此即初也經橫與佛法至作諸罪過釋曰第二別顯過相如經可知經非法非律至如囚禁法釋曰第三非法囚禁經當爾之時法滅不久釋曰第四結成過重經大王至滅破三寶釋曰自下第四誡約自毀文別有三初自毀次起惡後招報就自毀中先法後喻此即初也如經可知經如師子身中蟲至非外道也釋曰第二舉喻重釋釋此喻相如蓮華面經佛告阿難譬如師子命終身死若空若地若水若陸所有衆生不敢食彼師子身肉唯師子身自生諸蟲還自噉食師子之肉阿難我之佛法非餘能壞是我法中諸惡比丘破我三大阿僧祇劫積行勤苦所集佛法解云彼經但喻出家比丘不同此經通喻道俗經壞我佛法至至于百歲釋曰第二明起惡惡有三種一壞法得罪惡二正教不行惡三惡增壽減惡經其壞佛教至連禍縱橫釋曰第三招報於中有三初法次喻後合此即法説於中有三初明現報次顯生報後辨後報此明現報有其五種一壞佛教二無孝子三六親不和父母兄弟夫妻四天神不祐等五災怪不絶經死入地獄餓鬼畜生釋曰第二顯生報也經若出為人兵奴果報釋曰第三辨後報也廣辨三報具如別章經如響如影至火滅字在釋曰第二舉喻喻有三種初之二喻喻其現報如有聲形響影必逐有現業處報定同時故後之一喻喻生後報如人夜書火滅字在現業雖滅二報仍在或可前二通喻三時若有三業必有果隨如聲形處必有響影經三界果報亦復如是釋曰第三合法應知經大王至如兵奴法釋曰第五誡使役也文有四別一橫制二使役三攝録四示過橫制有三一能制人二橫制誡三屬當白衣是兵奴法也經若我弟子至是兵奴法釋曰第二使役也文有三節一立籍二強使三顯非佛弟子是兵奴法經立統官攝僧至兵奴之法釋曰第三攝録也文有四節一官攝二典攝三僧攝四屬是獄囚兵奴法也經當爾之時佛法不久釋曰第四示過也經大王至非佛法僧釋曰第六誡自咎也破國等緣自作自受非佛法僧經大王至常所行道釋曰第七誡謬信也文有四別一示善二示惡三謬信四示過此即示善此經乃是七佛法器十方諸佛常所行路故應流通經諸惡比丘至破國因緣釋曰第二示惡也諸惡比丘求名利故於王等前自説破法破國因緣比丘自説名為破法教王令作名為破國經其王不別至不依佛法釋曰第三謬信也王等不知求名利故信受諂言橫作法制不依佛誡經是為破佛至正法不久釋曰第四示過也信他諂語不依信佛言定是破佛國因緣法滅不久也經爾時十六至失光不現釋曰自下第二大衆奉持於中有二初人王傷感後天王嗟歎前中有二初明傷感後顯受持此即初也十六大王聞佛七誡未來惡事悲泣出聲震動三千諸光不現也經時諸王等至當如佛教釋曰第二受持佛教依如佛誡不敢違逆經爾時大衆至是無佛世釋曰第二天王嗟歎謂天王等嗟歎惡時無佛出世是空虛也經爾時無量至阿須輪王釋曰自下第二大衆奉行於中有二初明能受人後顯所受法此即初也文有三節一是菩薩二是聲聞三是雜品經聞佛所説至波羅蜜釋曰第二結所受法聞佛所説二護因緣頂戴受持奉行此法也
